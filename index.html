<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sign-up form</title>
    <!-- style css -->
    <link rel="stylesheet" href="./src/css/style.css" />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="./src/assets/fontawesome-free-7.2.0-web/css/all.min.css"
    />
  </head>
  <body>
    <main class="signup">
      <section class="signup-photo-container">
        <img
          src="./src/assets/images/vecteezy_work-from-home-illustration-concept-man-working-on-laptop_5514404.jpg"
          alt="vector photo"
          class="signup-img"
        />
      </section>
      <section class="signup-form">
        <form
          id="signup-form"
          action="#"
          method="POST"
          target="_blank"
          novalidate
        >
          <fieldset>
            <legend>Signup</legend>

            <div class="form-group">
              <label for="fullName"><i class="fa-solid fa-user"></i></label>
              <div class="input-group">
                <input
                  type="text"
                  id="fullName"
                  name="fullName"
                  placeholder="Full name"
                />
                <small class="error-message"></small>
              </div>
            </div>

            <div class="form-group">
              <label for="phoneNumber"><i class="fa-solid fa-phone"></i></label>
              <div class="input-group">
                <input
                  type="tel"
                  id="phoneNumber"
                  name="phoneNumber"
                  placeholder="(###) ### ###"
                />
                <small class="error-message"></small>
              </div>
            </div>

            <div class="form-group">
              <label for="email"><i class="fa-solid fa-at"></i></label>
              <div class="input-group">
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="email@address.com"
                />
                <small class="error-message"></small>
              </div>
            </div>

            <div class="form-group">
              <label for="password"><i class="fa-solid fa-key"></i></label>
              <div class="input-group">
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Password"
                />
                <small class="error-message"></small>
              </div>
            </div>

            <div class="form-group">
              <label for="confirmPassword"
                ><i class="fa-solid fa-lock"></i
              ></label>
              <div class="input-group">
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  placeholder="Confirm password"
                />
                <small class="error-message"></small>
              </div>
            </div>

            <div class="form-agreement">
              <p>
                By signing up, you agree to our
                <span class="terms">Terms & Conditions</span> and
                <span class="terms">Privacy Policy</span>
              </p>
            </div>

            <button class="btn submit-btn" type="submit">Create Account</button>

            <p class="form-login">
              Already have an account? <a href="#">Login</a>
            </p>
          </fieldset>
        </form>
      </section>
    </main>
    <script src="./src/js/app.js"></script>
  </body>
</html>
